name: tests

on:
  push:
    # Avoid using all the resources/limits available by checking only
    # relevant branches and tags. Other branches can be checked via PRs.
    branches: [main]
    tags: ['v[0-9]*', '[0-9]+.[0-9]+*']  # Match tags that resemble a version
  pull_request:
  workflow_dispatch:
  schedule:
    # Run roughly every 15 days at 00:00 UTC
    # (useful to check if updates on dependencies break the package)
    - cron: '0 0 1,16 * *'

permissions:
  contents: read

concurrency:
  group: >-
    ${{ github.workflow }}-${{ github.ref_type }}-
    ${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.13"}
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: pre-commit
        run: uv run --with pre-commit pre-commit run --all-files --show-diff-on-failure

  linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.13"}
      - name: Build wheels (manylinux2014, abi3)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          # `features = ["abi3"]` is set in pyproject.toml, so maturin
          # picks up `pyo3/abi3-py311` automatically and tags the wheel as
          # cp311-abi3. `manylinux: 2014` ensures the produced wheel has a
          # PyPI-accepted manylinux tag (a bare `linux_x86_64` tag is
          # rejected at upload).
          manylinux: '2014'
          args: --release --out dist
          sccache: 'true'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: ${{ matrix.target }}
      - name: Build wheel (abi3)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: 'true'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  test:
    needs: linux
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "${{ matrix.python }}"}
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - uses: actions/download-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: dist
      - name: Install built wheel + test deps
        run: |
          uv venv -p ${{ matrix.python }} .venv
          # One abi3 wheel covers 3.11+, so we don't need to match the
          # Python version when picking the file.
          uv pip install --python .venv/bin/python "$(ls dist/kithairon-*-cp311-abi3-manylinux*_x86_64.whl)[all]"
          uv pip install --python .venv/bin/python 'pytest~=7.4' 'pytest-cov~=4.1' 'hypothesis~=6.0'
      - name: Run tests against installed wheel
        run: |
          .venv/bin/pytest -rFEx --durations 10 --color yes

  publish:
    name: Publish to PyPI
    needs: [lint, linux, windows, sdist, test]
    if: ${{ github.event_name == 'push' && contains(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          # All wheel/sdist artifacts land flat in dist/.
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          packages-dir: dist
